enabled:
  - returns
  - movement

phase_3f:
  taxonomy:
    feature_families:
      - price_raw
      - price_derived
      - technical
      - alpha_formulaic
      - cross_sectional
      - volatility_realized
      - volatility_implied
      - microstructure_l1
      - microstructure_l2
      - orderflow
      - liquidity
      - term_structure
      - basis_funding
      - options_surface
      - cross_asset_macro
      - event_context
      - target_labels
      - meta_diagnostics

    family_status:
      price_raw: active_now
      price_derived: active_now
      technical: active_now
      alpha_formulaic: active_now
      cross_sectional: reserved_next
      volatility_realized: reserved_next
      volatility_implied: reserved_future
      microstructure_l1: reserved_future
      microstructure_l2: reserved_future
      orderflow: reserved_future
      liquidity: reserved_future
      term_structure: reserved_future
      basis_funding: reserved_future
      options_surface: reserved_future
      cross_asset_macro: reserved_next
      event_context: reserved_future
      target_labels: active_now
      meta_diagnostics: active_now

    capability_flags:
      - axis_time_series
      - axis_cross_sectional
      - requires_group_labels
      - requires_intraday
      - requires_level2
      - requires_options
      - requires_futures
      - requires_external_context

  run_capabilities:
    profile_name: fineas_daily_yfinance_multiasset_v2
    dataset_name: yfinance_norm_daily_multiasset
    interval: 1d
    universe_size: 28

    capability_flags:
      axis_time_series: true
      axis_cross_sectional: true
      requires_group_labels: false
      requires_intraday: false
      requires_level2: false
      requires_options: false
      requires_futures: false
      requires_external_context: false

    supported_input_levels:
      - daily_bar
      - cross_section

    group_label_fields: []

    notes: >
      Cross-sectional operators are executable in the broad daily run.
      Mixed U.S. equity, index, and crypto calendars require same-calendar
      subsets or a latest-timestamp-with-min-symbols rule for alpha validation.

  operator_contract:
    window_rule_default: floor_if_float
    rank_tie_policy: ordinal_normalized
    cross_section_rank_range: "[0, 1]"
    ts_rank_range: "[0, 1]"
    delay_requires_sorted_time: true
    rolling_windows_include_current_bar: true

  canonical_inputs:
    current_run_defaults:
      source_dataset: norm_ohlcv_daily
      bar_level: daily_bar

    explicitly_unsupported_current_run:
      - vwap

    reserved_group_labels:
      - sector
      - industry
      - subindustry

    reserved_future_microstructure:
      - bid
      - ask
      - mid

    reserved_future_derivatives:
      - funding_rate
      - iv_atm